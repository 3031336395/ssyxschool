<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSYX · 相册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(255,255,255,0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255,255,255,0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: fixed;
            font-size: 16px;
            animation: float linear infinite;
            pointer-events: none;
            z-index: 1;
            opacity: 0.4;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .music-btn {
            position: fixed;
            top: 25px;
            right: 25px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            transition: all 0.3s ease;
        }

        .music-btn:hover {
            background: rgba(255, 255, 255, 0.35);
            transform: scale(1.1);
        }

        .music-btn.playing {
            animation: rotate 3s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .home-page {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .home-page.hidden { display: none; }

        .title {
            font-size: 3rem;
            color: #fff;
            margin-bottom: 10px;
            letter-spacing: 8px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            animation: fadeInDown 1s ease-out;
        }

        .subtitle {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.8);
            margin-bottom: 60px;
            letter-spacing: 3px;
            animation: fadeInDown 1s ease-out 0.2s both;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 25px;
            width: 100%;
            max-width: 350px;
        }

        .album-btn {
            padding: 22px 40px;
            font-size: 1.3rem;
            color: #fff;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            cursor: pointer;
            letter-spacing: 4px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .album-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .album-btn:nth-child(1) { animation: fadeInUp 0.8s ease-out 0.4s both; }
        .album-btn:nth-child(2) { animation: fadeInUp 0.8s ease-out 0.5s both; }
        .album-btn:nth-child(3) { animation: fadeInUp 0.8s ease-out 0.6s both; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .album-page {
            display: none;
            position: relative;
            z-index: 10;
            min-height: 100vh;
            padding: 30px 20px;
            flex-direction: column;
            align-items: center;
        }

        .album-page.active { display: flex; }

        .back-btn {
            position: fixed;
            top: 25px;
            left: 25px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 25px;
            color: #fff;
            cursor: pointer;
            z-index: 100;
            font-size: 0.95rem;
            transition: all 0.3s;
            font-family: inherit;
        }

        .back-btn:hover { background: rgba(255,255,255,0.35); }

        .album-title {
            color: #fff;
            font-size: 1.8rem;
            margin: 20px 0 30px;
            letter-spacing: 3px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            padding: 10px;
        }

        .photo-card {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 4/3;
            background: rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .photo-card:hover {
            transform: scale(1.03);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .lightbox.show { display: flex; }

        .lightbox img {
            max-width: 90%;
            max-height: 85vh;
            border-radius: 8px;
        }

        .lightbox-close {
            position: absolute;
            top: 25px;
            right: 30px;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            background: none;
            border: none;
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: #fff;
            font-size: 3rem;
            cursor: pointer;
            background: rgba(255,255,255,0.1);
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .lightbox-nav:hover { background: rgba(255,255,255,0.25); }
        .lightbox-prev { left: 30px; }
        .lightbox-next { right: 30px; }

        .empty-tip {
            color: rgba(255,255,255,0.6);
            text-align: center;
            padding: 60px 20px;
            grid-column: 1 / -1;
        }

        @media (max-width: 600px) {
            .title { font-size: 2rem; letter-spacing: 4px; }
            .subtitle { font-size: 0.9rem; margin-bottom: 40px; }
            .album-btn { padding: 18px 30px; font-size: 1.1rem; }
            .gallery { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
            .lightbox-nav { width: 45px; height: 45px; font-size: 1.5rem; }
            .lightbox-prev { left: 10px; }
            .lightbox-next { right: 10px; }
        }
    </style>
</head>
<body>
    <button class="music-btn" id="musicBtn">🎵</button>
    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="home-page" id="homePage">
        <h1 class="title">SSYX</h1>
        <p class="subtitle">那些年 · 我们一起走过的日子</p>
        <div class="btn-group">
            <button class="album-btn" onclick="openAlbum(0)">A</button>
            <button class="album-btn" onclick="openAlbum(1)">B</button>
            <button class="album-btn" onclick="openAlbum(2)">C</button>
        </div>
    </div>

    <div class="album-page" id="albumPage">
        <button class="back-btn" onclick="goHome()">← 返回首页</button>
        <h2 class="album-title" id="albumTitle"></h2>
        <div class="gallery" id="gallery"></div>
    </div>

    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" onclick="closeLightbox()">×</button>
        <button class="lightbox-nav lightbox-prev" onclick="prevPhoto()">‹</button>
        <img id="lightboxImg" src="" alt="">
        <button class="lightbox-nav lightbox-next" onclick="nextPhoto()">›</button>
    </div>

    <script>
        // ===== 配置区：改这里就行 =====
        const albumNames = ['A', 'B', 'C'];

        const albumPhotos = [
            [], // A分类图片
            [], // B分类图片
            []  // C分类图片
        ];
        // =============================

        let currentAlbum = 0;
        let currentPhotoIndex = 0;

        const particles = ['📚', '✏️', '🎓', '⭐', '🍃', '☀️'];
        for (let i = 0; i < 15; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.textContent = particles[Math.floor(Math.random() * particles.length)];
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = Math.random() * 100 + 'vh';
            p.style.animationDuration = (Math.random() * 4 + 4) + 's';
            p.style.animationDelay = (Math.random() * 4) + 's';
            document.body.appendChild(p);
        }

        document.querySelectorAll('.album-btn').forEach((btn, i) => {
            btn.textContent = albumNames[i];
        });

        function openAlbum(index) {
            currentAlbum = index;
            document.getElementById('homePage').classList.add('hidden');
            document.getElementById('albumPage').classList.add('active');
            document.getElementById('albumTitle').textContent = albumNames[index];
            renderGallery();
        }

        function goHome() {
            document.getElementById('homePage').classList.remove('hidden');
            document.getElementById('albumPage').classList.remove('active');
        }

        function renderGallery() {
            const gallery = document.getElementById('gallery');
            const photos = albumPhotos[currentAlbum];
            if (photos.length === 0) {
                gallery.innerHTML = '<div class="empty-tip">📷 暂无照片</div>';
                return;
            }
            gallery.innerHTML = photos.map((src, i) => `
                <div class="photo-card" onclick="openLightbox(${i})">
                    <img src="${src}" alt="照片${i+1}">
                </div>
            `).join('');
        }

        function openLightbox(index) {
            currentPhotoIndex = index;
            document.getElementById('lightboxImg').src = albumPhotos[currentAlbum][index];
            document.getElementById('lightbox').classList.add('show');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('show');
        }

        function prevPhoto() {
            const photos = albumPhotos[currentAlbum];
            currentPhotoIndex = (currentPhotoIndex - 1 + photos.length) % photos.length;
            document.getElementById('lightboxImg').src = photos[currentPhotoIndex];
        }

        function nextPhoto() {
            const photos = albumPhotos[currentAlbum];
            currentPhotoIndex = (currentPhotoIndex + 1) % photos.length;
            document.getElementById('lightboxImg').src = photos[currentPhotoIndex];
        }

        document.addEventListener('keydown', function(e) {
            if (!document.getElementById('lightbox').classList.contains('show')) return;
            if (e.key === 'ArrowLeft') prevPhoto();
            if (e.key === 'ArrowRight') nextPhoto();
            if (e.key === 'Escape') closeLightbox();
        });

        document.getElementById('lightbox').addEventListener('click', function(e) {
            if (e.target.id === 'lightbox') closeLightbox();
        });

        const musicBtn = document.getElementById('musicBtn');
        const bgMusic = document.getElementById('bgMusic');
        let isPlaying = false;

        musicBtn.addEventListener('click', function() {
            if (isPlaying) { bgMusic.pause(); musicBtn.classList.remove('playing'); }
            else { bgMusic.play().catch(()=>{}); musicBtn.classList.add('playing'); }
            isPlaying = !isPlaying;
        });

        document.body.addEventListener('click', function initAudio() {
            if (!isPlaying) {
                bgMusic.volume = 0.5;
                bgMusic.play().then(() => {
                    isPlaying = true;
                    musicBtn.classList.add('playing');
                }).catch(()=>{});
            }
        }, { once: true });
    </script>
</body>
</html>
